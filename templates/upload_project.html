{% extends "base.html" %}
{% block content %}

<style>
    body {
        background: linear-gradient(rgba(32,51,72,0.88), rgba(32,51,72,0.88)),
                    url("{{ url_for('static', filename='images/MM1.png') }}") no-repeat center center fixed;
        background-size: cover;
        color: #fff;
        font-family: "Georgia", serif;
    }

    .upload-container {
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
    }

    .upload-card {
        background: rgba(10, 25, 45, 0.55);
        border: 2px solid rgba(255, 255, 255, 0.14);
        border-radius: 22px;
        padding: 40px;
        box-shadow: 0 18px 55px rgba(0,0,0,0.35);
    }

    .upload-card h2 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 32px;
        font-weight: 800;
    }

    .header-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 600;
        color: #d7dde6;
    }

    .form-control {
        width: 100%;
        padding: 14px 18px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        font-family: inherit;
        box-sizing: border-box;
        font-size: 16px;
    }

    .form-control:focus {
        outline: none;
        border-color: #fff;
        background: rgba(255, 255, 255, 0.1);
    }

    .btn-submit {
        width: 100%;
        padding: 16px;
        border-radius: 14px;
        border: none;
        background: #fff;
        color: #203348;
        font-weight: 900;
        font-size: 18px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
    }

    .btn-submit:hover {
        transform: scale(1.02);
        opacity: 0.9;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #d7dde6;
        text-decoration: none;
        font-weight: 600;
    }

    .back-link:hover {
        color: #fff;
    }
</style>

<div class="upload-container">
    <div class="upload-card">
        <div class="header-container">
            <h2 style="margin: 0;">Share Your Project</h2>
            <a href="{{ url_for('projects_dashboard') }}" class="btn-back-global">← Back</a>
        </div>
        
        {% if session.get('student_code') %}
        <form action="{{ url_for('upload_project') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" name="title" class="form-control" placeholder="Enter project name" required>
            </div>
            <div class="form-group">
                <label>General Idea / Description</label>
                <textarea name="description" class="form-control" rows="5" placeholder="Describe your project idea..."></textarea>
            </div>
            <div class="form-group">
                <label>Project Code (Zip/File)</label>
                <input type="file" name="code_file" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">Upload Project</button>
        </form>
        {% else %}
        <div style="text-align: center; padding: 20px;">
            <p>Please <a href="{{ url_for('login') }}" style="color: #fff; font-weight: 800;">Login as a student</a> to upload.</p>
        </div>
        {% endif %}
        
        <a href="{{ url_for('projects_dashboard') }}" class="back-link">← Back to Projects Dashboard</a>
    </div>
</div>

{% endblock %}
