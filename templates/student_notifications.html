{% extends "base.html" %}
{% block content %}

<style>
body{
    margin:0;
    background: radial-gradient(circle at top,#0f172a,#050816);
    color:white;
    font-family:Segoe UI;
}

.container{
    width:90%;
    max-width:800px;
    margin:40px auto;
}

h1{
    text-align:center;
    color:#00d4ff;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    margin-bottom:12px;
    border-radius:15px;
    border-left:4px solid #7c3aed;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    border-left:4px solid #00d4ff;
}

.title{
    font-size:18px;
    margin-bottom:5px;
}

.msg{
    opacity:0.9;
}

.time{
    font-size:11px;
    opacity:0.5;
    margin-top:5px;
}
</style>

<div class="container">

    <h1>🔔 Notifications</h1>

    {% if notifications %}
        {% for n in notifications %}
            <div class="card">
                <div class="title">{{ n.title }}</div>
                <div class="msg">{{ n.message }}</div>
                <div class="time">{{ n.created_at }}</div>
            </div>
        {% endfor %}
    {% else %}
        <p style="text-align:center;opacity:0.7;">No notifications yet</p>
    {% endif %}

</div>

{% endblock %}
